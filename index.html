<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards com Fotos</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
    padding: 40px;
}

h1{
    margin-bottom: 30px;
}

.container{
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.flashcard{
    width: 250px;
    height: 300px;
    perspective: 1000px;
    cursor: pointer;
}

.card{
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.7s;
    transform-style: preserve-3d;
}

.flashcard.flip .card{
    transform: rotateY(180deg);
}

.front,
.back{
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    overflow: hidden;
    backface-visibility: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.front{
    background: white;
}

.front img{
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.front h3{
    margin: 15px;
}

.back{
    background: #4f46e5;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    transform: rotateY(180deg);
    font-size: 1.2rem;
}
</style>
</head>
<body>

<h1>Flashcards com Fotos</h1>

<div class="container">

    <div class="flashcard" onclick="virar(this)">
        <div class="card">
            <div class="front">
                <img src="https://images.unsplash.com/photo-1516306580123-e6e52b1b7b5f?w=600" alt="Brasília">
                <h3>Qual é a capital do Brasil?</h3>
            </div>
            <div class="back">
                Brasília
            </div>
        </div>
    </div>

    <div class="flashcard" onclick="virar(this)">
        <div class="card">
            <div class="front">
                <img src="https://images.unsplash.com/photo-1509228468518-180dd4864904?w=600" alt="Matemática">
                <h3>Quanto é 7 × 8?</h3>
            </div>
            <div class="back">
                56
            </div>
        </div>
    </div>

    <div class="flashcard" onclick="virar(this)">
        <div class="card">
            <div class="front">
                <img src="https://images.unsplash.com/photo-1614728263952-84ea256f9679?w=600" alt="Marte">
                <h3>Qual é o planeta vermelho?</h3>
            </div>
            <div class="back">
                Marte
            </div>
        </div>
    </div>

</div>

<script>
function virar(elemento){
    elemento.classList.toggle("flip");
}
</script>

</body>
</html>
